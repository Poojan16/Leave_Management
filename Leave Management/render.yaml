services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: lms-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lms-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lms-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: https://lms.vercel.app
      - key: SENTRY_DSN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: lms-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - name: lms-postgres
    plan: starter
    region: oregon
    databaseName: leave_management
    user: lms_user
